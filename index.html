<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DietManager</title>
  <link rel="stylesheet" href="./style.css" />
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="./config.js"></script>
  <script defer src="./app.js"></script>
</head>
<body>
  <main class="app-shell">
    <section class="card">
      <p class="eyebrow">DietManager</p>
      <h1>LINEログイン Hello World</h1>
      <p id="status" class="status loading">起動中...</p>

      <div class="profile-box">
        <img id="picture" class="avatar hidden" alt="LINE profile image" />
        <div>
          <p class="label">表示名</p>
          <p id="displayName" class="value">未取得</p>
        </div>
        <div>
          <p class="label">User ID</p>
          <p id="userId" class="value small">未取得</p>
        </div>
      </div>

      <section class="result-box">
        <p class="label">GAS Response</p>
        <pre id="gasResponse">未取得</pre>
      </section>

      <section class="result-box">
        <p class="label">Debug</p>
        <pre id="debug">待機中</pre>
      </section>
    </section>
  </main>
</body>
</html>
